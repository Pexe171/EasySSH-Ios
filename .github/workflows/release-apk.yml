name: Publicar APK

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publicar-apk:
    name: Gerar e publicar APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Permitir execução do Gradle Wrapper
        run: chmod +x gradlew

      - name: Validar testes e gerar APK
        run: ./gradlew testDebugUnitTest assembleDebug

      - name: Preparar pacote
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK_PATH="dist/EasySSH-v${VERSION}-debug.apk"

          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "${APK_PATH}"

          cat > release-notes.md <<EOF
          # EasySSH ${GITHUB_REF_NAME}

          APK público de teste para instalação direta em Android.

          Arquivo:
          - EasySSH-v${VERSION}-debug.apk

          Observações:
          - Build gerado a partir do código-fonte versionado.
          - APK assinado com chave debug do Android, adequado para testes e validação inicial.
          - Para uso em produção, a próxima etapa é configurar assinatura release com keystore privado.
          EOF

      - name: Publicar no GitHub Releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK_PATH="dist/EasySSH-v${VERSION}-debug.apk"

          gh release create "${GITHUB_REF_NAME}" "${APK_PATH}" \
            --title "EasySSH ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --verify-tag
